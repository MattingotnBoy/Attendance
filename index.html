<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111111" />
  <title>Matthew's Attendance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="head">
      <h1>Matthew's Attendance</h1>
      <p class="sub">How many classes can I miss?</p>
    </header>

    <section class="card">
      <div class="field">
        <label for="attended">Classes attended</label>
        <input type="number" id="attended" min="0" step="1" inputmode="numeric" placeholder="0" />
      </div>

      <div class="field">
        <label for="total">Total classes held</label>
        <input type="number" id="total" min="0" step="1" inputmode="numeric" placeholder="0" />
      </div>

      <div class="field">
        <label for="remaining">Classes left this semester <span class="opt">· optional</span></label>
        <input type="number" id="remaining" min="0" step="1" inputmode="numeric" placeholder="0" />
      </div>

      <div class="field">
        <label for="target">Required attendance</label>
        <div class="target-row">
          <input type="number" id="target" min="1" max="100" step="1" value="75" inputmode="numeric" />
          <span class="pct">%</span>
          <div class="presets">
            <button type="button" class="preset is-active" data-target="75">75</button>
            <button type="button" class="preset" data-target="85">85</button>
            <button type="button" class="preset" data-target="90">90</button>
          </div>
        </div>
        <p class="hint">Christ University needs <strong>75%</strong> per subject.</p>
      </div>

      <button type="button" id="calc" class="calc-btn">Calculate</button>
    </section>

    <section class="card result" id="result" hidden aria-live="polite"></section>

    <footer class="foot">
      Unofficial. Some courses set a higher bar — always confirm with your department.
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
